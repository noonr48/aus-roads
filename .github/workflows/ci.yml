name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

env:
  GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

jobs:
  build:
    name: Build and test (ubuntu-latest, JDK 17)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Permission audit (offline flavor — no INTERNET, no LOCATION)
        working-directory: android
        run: |
          set -e
          # The `offline` flavor is the privacy flagship: it must declare neither
          # INTERNET nor any ACCESS_*_LOCATION. The `withNetwork` flavor legitimately
          # does; we audit only that the offline build stays clean. assembleDebug
          # builds both flavors into apk/<flavor>/debug/.
          APK_PATH=$(find app/build/outputs/apk/offline/debug -name '*.apk' | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "No offline APK found"; exit 1
          fi
          echo "Auditing $APK_PATH"
          AAPT2="$ANDROID_HOME/build-tools/$(ls -1 $ANDROID_HOME/build-tools | sort -V | tail -1)/aapt2"
          PERMS=$("$AAPT2" dump permissions "$APK_PATH" 2>/dev/null || true)
          echo "$PERMS"
          # The auto-generated DYNAMIC_RECEIVER_NOT_EXPORTED_PERMISSION is fine;
          # it is an internal-only Android 14 permission with no privacy impact.
          if echo "$PERMS" | grep -E "INTERNET|ACCESS_(FINE|COARSE|BACKGROUND)_LOCATION" ; then
            echo "ERROR: offline flavor must not declare INTERNET or LOCATION permissions"
            exit 1
          fi
          echo "Permission audit passed: offline flavor has no INTERNET, no LOCATION"

      - name: Static analysis (detekt)
        working-directory: android
        run: ./gradlew detekt

      - name: Unit tests
        working-directory: android
        # `test` runs every module's unit tests across both flavors — the flavored
        # app's tests are testOfflineDebugUnitTest / testWithNetworkDebugUnitTest,
        # which the old `testDebugUnitTest` target silently skipped.
        run: ./gradlew test

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aus-roads-debug-apk
          path: android/app/build/outputs/apk/*/debug/*.apk
          if-no-files-found: warn
